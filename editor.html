<!DOCTYPE html>
<html lang="English">
    <head>
        <title>Bellesaurus | Blog</title>
        <meta charset="'UTF-8">
        <link rel="stylesheet" type="text/css" href="css/editor.css">
        <link rel="stylesheet" type="text/css" href="css/style.css">
        <script src="https://kit.fontawesome.com/b5a010aac8.js" crossorigin="anonymous"></script>
        
        <!--tab icon-->
        <link rel="shortcut icon" href="img/Bellesaurus.png">
    
    
    </head>

    <body>
        <div class="banner">
            <input type="file" accept="image/*" id="banner-upload" hidden>
            <label for="banner-upload" class="banner-upload-btn"><img src="img/Website Blog Banner.png" alt="upload banner"></label>
        </div>

        <div class="blog">
            <textarea type="text" class="title" placeholder="Blog title..."></textarea>
            <textarea type="text" class="article" placeholder="Start writing here..."></textarea>
        </div>

        <div class="blog-options">
            <button class="btn dark publish-btn">publish</button>
            <input type="file" accept="image/*" id="image-upload" hidden>
            <label for="image-upload" class="btn grey upload-btn">Upload Image</label>
        </div>

       <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js"></script>
       <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js"></script>  
       
       <script src="js/editor.js"></script>
       <script src="js/firebase.js"></script>

    </body>
</html>
